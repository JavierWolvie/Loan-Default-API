<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoanPredict</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a;
    color: white;
}

/* Navbar */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 60px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
}

.navbar h2 {
    font-weight: 600;
}

.nav-links a {
    color: white;
    text-decoration: none;
    margin-left: 25px;
    font-size: 14px;
}

.nav-links a:last-child {
    background: #3b82f6;
    padding: 10px 18px;
    border-radius: 6px;
}

/* Hero */
.hero {
    height: 90vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #1e3a8a, #020617);
    text-align: center;
}

.hero h1 {
    font-size: 3.2rem;
    margin-bottom: 10px;
}

.hero p {
    color: #cbd5f5;
    font-size: 1.2rem;
}

.hero .btn {
    margin-top: 25px;
    padding: 15px 35px;
    background: #22c55e;
    border-radius: 8px;
    text-decoration: none;
    color: white;
    font-weight: 600;
}

/* Features */
.features {
    display: flex;
    justify-content: space-around;
    padding: 70px 60px;
    background: #020617;
}

.feature {
    width: 30%;
    text-align: center;
}

.feature h3 {
    margin-bottom: 10px;
}

.feature p {
    color: #94a3b8;
}

/* Footer */
.footer {
    text-align: center;
    padding: 25px;
    background: #020617;
    color: #64748b;
}
</style>

</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <h2>LoanPredict</h2>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/predict">Predict</a>
    </div>
</div>

<!-- Hero -->
<div class="hero">
    <h1>AI Loan Default Prediction</h1>
    <p>Evaluate borrower risk instantly using machine learning.</p>
    <a href="/predict" class="btn">Get Started</a>
</div>

<!-- Features -->
<div class="features">
    <div class="feature">
        <h3>⚡ Fast</h3>
        <p>Instant results powered by ML.</p>
    </div>
    <div class="feature">
        <h3>📊 Accurate</h3>
        <p>Optimized model with strong performance.</p>
    </div>
    <div class="feature">
        <h3>🔒 Secure</h3>
        <p>No data is stored or shared.</p>
    </div>
</div>

<!-- Footer -->
<div class="footer">
    © 2026 LoanPredict
</div>

</body>
</html>
